[pytest]
# 测试目录
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步模式
asyncio_mode = auto

# 标记定义
markers =
    unit: 单元测试
    integration: 集成测试
    e2e: 端到端测试
    slow: 耗时测试
    skip_in_ci: CI环境跳过

# 覆盖率配置
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=35

# 忽略目录
norecursedirs = .git .tox build dist *.egg venv env

# 环境变量
env =
    TESTING=true
    DATABASE_URL=sqlite:///:memory:
