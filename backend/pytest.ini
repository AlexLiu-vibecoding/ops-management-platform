[pytest]
# 测试目录
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 异步模式
asyncio_mode = auto

# 标记定义
markers =
    unit: 单元测试（纯函数/类，无外部依赖）
    integration: 集成测试（需要数据库）
    e2e: 端到端测试（完整流程）
    slow: 耗时测试（>1秒）
    fast: 快速测试（<100ms）
    smoke: 冒烟测试（核心功能）
    skip_in_ci: CI环境跳过
    requires_db: 需要真实数据库连接
    requires_redis: 需要真实Redis连接
    requires_mysql: 需要MySQL服务器
    requires_postgresql: 需要PostgreSQL服务器

# 默认配置（完整测试）
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --cov-fail-under=55

# 忽略目录
norecursedirs = .git .tox build dist *.egg venv env

# 环境变量
env =
    TESTING=true
    DATABASE_URL=sqlite:///:memory:
