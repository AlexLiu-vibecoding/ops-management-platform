# ============================================================
# Alembic 数据库迁移配置
# ============================================================

[alembic]
# 迁移脚本目录
script_location = alembic

# 版本文件命名格式
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(slug)s

# 时区设置
timezone = Asia/Shanghai

# 截断长标识符
truncate_slug_length = 40

# 版本目录
version_path_separator = os

# 输出编码
output_encoding = utf-8

# 数据库 URL (运行时从环境变量读取)
# sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# 迁移文件生成后的钩子

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
