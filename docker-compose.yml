# 运维管理平台 - Docker Compose 配置
# 适用于快速部署和测试环境

version: '3.8'

services:
  # 主应用服务（前端 + 后端）
  ops-platform:
    build:
      context: .
      dockerfile: Dockerfile
    image: ops-platform:latest
    container_name: ops-platform
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      # 数据库配置 (使用外部数据库)
      - DATABASE_URL=${DATABASE_URL:-}
      - PGDATABASE_URL=${PGDATABASE_URL:-}
      - MYSQL_HOST=${MYSQL_HOST:-}
      - MYSQL_PORT=${MYSQL_PORT:-3306}
      - MYSQL_USER=${MYSQL_USER:-}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD:-}
      - MYSQL_DATABASE=${MYSQL_DATABASE:-}
      # Redis 配置
      - REDIS_HOST=${REDIS_HOST:-}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # 安全配置
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-change-this-to-random-string-min-32-chars}
      - AES_KEY=${AES_KEY:-change-this-to-32-char-aes-key!!}
      - PASSWORD_SALT=${PASSWORD_SALT:-change-this-salt}
    volumes:
      - app_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/init/status"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  app_logs:
    driver: local
