[supervisord]
nodaemon=true
user=root
logfile=/app/logs/supervisord.log
pidfile=/var/run/supervisord.pid
childlogdir=/app/logs

[program:nginx]
command=/usr/sbin/nginx -g "daemon off;"
autostart=true
autorestart=true
stdout_logfile=/app/logs/nginx-access.log
stderr_logfile=/app/logs/nginx-error.log
priority=100

[program:uvicorn]
command=/opt/venv/bin/python -m uvicorn app.main:app --host 127.0.0.1 --port 8000
directory=/app/backend
autostart=true
autorestart=true
stdout_logfile=/app/logs/uvicorn-access.log
stderr_logfile=/app/logs/uvicorn-error.log
priority=200
startsecs=5
startretries=3
