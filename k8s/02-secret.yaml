# ============================================================
# Secret - 敏感配置
# 注意：生产环境应使用 Sealed Secrets 或 External Secrets
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: opscenter-secret
  namespace: opscenter
type: Opaque
stringData:
  # PostgreSQL 密码
  POSTGRES_PASSWORD: "change-me-postgres-password"

  # MySQL 密码
  MYSQL_PASSWORD: "change-me-mysql-password"

  # Redis 密码（可选）
  REDIS_PASSWORD: "change-me-redis-password"

  # JWT 密钥（至少32字符）
  JWT_SECRET_KEY: "change-me-jwt-secret-key-min-32-chars-long"

  # AES 加密密钥（32字符）
  AES_KEY: "change-me-to-32-char-aes-key!!"

  # 密码盐
  PASSWORD_SALT: "change-me-password-salt-random"

  # 对象存储密钥
  STORAGE_ACCESS_KEY: "change-me-storage-access-key"
  STORAGE_SECRET_KEY: "change-me-storage-secret-key"
  STORAGE_BUCKET: "opscenter-bucket"

  # API 密钥
  AI_API_KEY: "change-me-ai-api-key"
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/WEBHOOK/URL"
  EMAIL_SMTP_PASSWORD: "change-me-smtp-password"

  # 数据库加密密钥
  DB_ENCRYPTION_KEY: "change-me-db-encryption-key"

  # 其他敏感配置
  INTERNAL_API_SECRET: "change-me-internal-api-secret"
