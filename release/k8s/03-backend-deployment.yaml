# ============================================================
# Deployment - 后端应用
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opscenter-backend
  namespace: opscenter
  labels:
    app: opscenter
    component: backend
    version: v1
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: opscenter
      component: backend
  template:
    metadata:
      labels:
        app: opscenter
        component: backend
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: opscenter-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      initContainers:
        # 等待数据库就绪
        - name: wait-for-postgres
          image: postgres:15-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h ${POSTGRES_HOST} -p ${POSTGRES_PORT} -U postgres; do
                echo "Waiting for PostgreSQL..."
                sleep 2
              done
              echo "PostgreSQL is ready!"
          env:
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: POSTGRES_PORT

        # 等待Redis就绪
        - name: wait-for-redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              until redis-cli -h ${REDIS_HOST} -p ${REDIS_PORT} ping; do
                echo "Waiting for Redis..."
                sleep 2
              done
              echo "Redis is ready!"
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: REDIS_PORT

      containers:
        - name: backend
          image: opscenter/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          env:
            # 从ConfigMap读取配置
            - name: APP_NAME
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: APP_NAME
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: APP_ENV
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: LOG_LEVEL
            - name: DEPLOY_RUN_PORT
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: DEPLOY_RUN_PORT

            # PostgreSQL配置
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: POSTGRES_PORT
            - name: POSTGRES_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: POSTGRES_DATABASE
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opscenter-secret
                  key: POSTGRES_PASSWORD

            # MySQL配置
            - name: MYSQL_HOST
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: MYSQL_HOST
            - name: MYSQL_PORT
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: MYSQL_PORT
            - name: MYSQL_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: MYSQL_DATABASE
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opscenter-secret
                  key: MYSQL_PASSWORD

            # Redis配置
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: REDIS_PORT
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opscenter-secret
                  key: REDIS_PASSWORD

            # 安全配置
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: opscenter-secret
                  key: JWT_SECRET_KEY
            - name: AES_KEY
              valueFrom:
                secretKeyRef:
                  name: opscenter-secret
                  key: AES_KEY
            - name: PASSWORD_SALT
              valueFrom:
                secretKeyRef:
                  name: opscenter-secret
                  key: PASSWORD_SALT

            # 存储配置
            - name: STORAGE_TYPE
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: STORAGE_TYPE
            - name: STORAGE_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: opscenter-secret
                  key: STORAGE_ACCESS_KEY
            - name: STORAGE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: opscenter-secret
                  key: STORAGE_SECRET_KEY
            - name: STORAGE_BUCKET
              valueFrom:
                secretKeyRef:
                  name: opscenter-secret
                  key: STORAGE_BUCKET

            # 其他配置
            - name: MAX_WORKERS
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: MAX_WORKERS
            - name: ENABLE_NOTIFICATION
              valueFrom:
                configMapKeyRef:
                  name: opscenter-config
                  key: ENABLE_NOTIFICATION

            # COZE域名
            - name: COZE_PROJECT_DOMAIN_DEFAULT
              value: "http://opscenter-service"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

          livenessProbe:
            httpGet:
              path: /api/init/status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /api/init/status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:
            httpGet:
              path: /api/init/status
              port: http
            initialDelaySeconds: 0
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          volumeMounts:
            - name: logs
              mountPath: /app/logs
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: logs
          emptyDir: {}
        - name: tmp
          emptyDir: {}

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - opscenter
                    - key: component
                      operator: In
                      values:
                        - backend
                topologyKey: kubernetes.io/hostname

      tolerations:
        - key: "node.kubernetes.io/not-ready"
          operator: "Exists"
          effect: "NoExecute"
          tolerationSeconds: 300
